# orchestrator_config.yaml
# Full schema from PRD Section 6.2 -- placeholder paths for development

orchestrator:
  global_concurrency_limit: 3       # max concurrent sessions across all projects
  per_project_concurrency: 1        # max 1 running task per project (immutable for now)
  review_consensus_threshold: 0.8
  session_timeout_minutes: 720
  subprocess_terminate_grace_seconds: 5
  max_total_subprocesses: 100
  inactivity_timeout_minutes: 0
  execution_model: "claude-sonnet-4-5"
  unified_env_path: "~/.helixos/.env"
  state_db_path: "~/.helixos/state.db"
  plan_validation:
    max_proposed_tasks: 10
    soft_max_proposed_tasks: 8
    soft_max_steps_per_task: 12
    soft_max_files_per_task: 8
    max_validation_retries: 2

projects:
  helixos:
    name: "HelixOS"
    repo_path: "~/Desktop/Gen_AI_Proj/helixos"
    executor_type: "code"
    tasks_file: "TASKS.md"
    max_concurrency: 1
    is_primary: true

  homestead:
    name: homestead_asset_management_system
    repo_path: ~/Desktop/Gen_AI_Proj/homestead_asset_management_system
    executor_type: code
    tasks_file: TASKS.md
    max_concurrency: 1
    claude_md_path: ~/Desktop/Gen_AI_Proj/homestead_asset_management_system\CLAUDE.md
git:
  auto_commit: true
  commit_message_template: "[helixos] {project}: {task_id} {task_title}"
  staged_safety_check:
    max_files: 50
    max_total_size_mb: 10

review_pipeline:
  review_timeout_minutes: 60
  reviewers:
  - model: "claude-opus-4-6"
    focus: "feasibility_and_edge_cases"
    api: "claude_cli"
    required: true
  - model: "claude-opus-4-6"
    focus: "adversarial_red_team"
    api: "claude_cli"
    required: false

dependencies: []
